name: Build QT

on:
  workflow_dispatch:
    inputs:
      QT_VERSION:
        description: "QT version"
        required: true
        default: "5.15.0"
      PLATFORM:
        description: "Build platform and compiler (win32-msvc)"
        required: false
        default: "win32-msvc"
      PUBLISH:
        description: "Publish package in github (true, false)"
        required: false
        default: "false"

env:
  QTVER: "v${{ github.event.inputs.QT_VERSION }}"
  NUPKG_VER: "${{ github.event.inputs.QT_VERSION }}"
  PLATFORM: "${{ github.event.inputs.PLATFORM }}"

jobs:
  build:
    runs-on: windows-latest

    env:
      vcvars_bat: '"C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat"'
      QT_CONF: 'qtbase/bin/qt.conf' # Extract the QT_BUILD_TYPE from this file
      # Intermediate folders
      QT_ROOT: '${{ github.workspace}}/../qt/'
      QT_DEPLOY: '${{ github.workspace}}/../deploy/'
      MAKE_TOOL: make

    steps:
    - uses: actions/checkout@v1

    - name: Checkout QT
      uses: actions/checkout@v1
      with:
        repository: qt/qt5
        ref: ${{ env.QTVER }}
        #submodules: 'true'
        path: qt  # This is QT_ROOT

    - name: Checkout qtbase submodule
      run: git -C ${{ env.QT_ROOT }} submodule update --init qtbase

    - name: Prepare MSVS environment
      if: contains( env.PLATFORM, 'msvc')
      run: |
        $tempfile = [IO.Path]::GetTempFileName()
        $proc = start-process -NoNewWindow -Wait -PassThru -RedirectStandardOutput $tempfile "$env:ComSpec" "/c $env:vcvars_bat 2> nul && set"
        if ($proc.ExitCode) {exit $proc.ExitCode}
        Get-Content $tempfile | foreach-object {
          $s = $_.Split("=",2)
          if ($s.Length -eq 2) {
            $n,$v = $s
            # Export new variables only
            if (-not $(Test-Path env:$n) -or $v -ne $(Get-Item env:$n).Value) {
              echo "::set-env name=$n::$v"
            }
          }
        }
        del $tempfile
        echo "::set-env name=MAKE_TOOL::nmake"

    - name: Configure QT
      run: |
        cd ${{ env.QT_ROOT }}
        $deploy_dir = mkdir -Force "${{ env.QT_DEPLOY }}"
        echo "Run QT configure to $deploy_dir..."
        .\configure.bat -prefix $deploy_dir -nomake examples -nomake tests -opensource -confirm-license

    - name: Select QT_BUILD_TYPE and QT_BUILD_TYPE_EXT
      run: |
        cd ${{ env.QT_ROOT }}

        # Obtain build type (TargetSpec)
        $QT_BUILD_TYPE = ""
        if ( Test-Path ${{ env.QT_CONF }} ) {
          Get-Content ${{ env.QT_CONF }} | foreach-object { $n,$v = $_.Split("=", 2)
            if ($n -eq "TargetSpec") { $QT_BUILD_TYPE = $v; echo "::set-env name=QT_BUILD_TYPE::$v" }
          }
        }
        echo "QT_BUILD_TYPE set to $QT_BUILD_TYPE"

        # Append Visual Studio version
        $QT_BUILD_TYPE_EXT = $QT_BUILD_TYPE
        if ("${{ env.VisualStudioVersion }}") {
          echo "  VisualStudioVersion is ${{ env.VisualStudioVersion }}"
          $QT_BUILD_TYPE_EXT = "${QT_BUILD_TYPE_EXT}-v${{ env.VisualStudioVersion }}"
        }
        echo "::set-env name=QT_BUILD_TYPE_EXT::$QT_BUILD_TYPE_EXT"
        echo "QT_BUILD_TYPE_EXT set to $QT_BUILD_TYPE_EXT"

    - name: Make QT
      run: |
        cd ${{ env.QT_ROOT }}
        echo "Run ${{ env.MAKE_TOOL }}..."
        ${{ env.MAKE_TOOL }}

    - name: Install QT
      run: |
        cd ${{ env.QT_ROOT }}
        echo "Run ${{ env.MAKE_TOOL }} install..."
        ${{ env.MAKE_TOOL }} install

    - name: Create NuGet package
      run: nuget pack -BasePath ${{ env.QT_DEPLOY }} -Version ${{ env.NUPKG_VER }}-${{ env.QT_BUILD_TYPE_EXT }}

    - name: Publish NuGet package
      if: github.event.inputs.PUBLISH == 'true'
      run: |
        echo "# Authenticate"
        dotnet nuget add source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json -n github -u ${{ github.repository_owner }} -p ${{ secrets.REPO_TOKEN }}

        echo "# Publish"
        dotnet nuget push "*.nupkg" --source "github"

    - name: Obtain NuGet package name
      if: github.event.inputs.PUBLISH != 'true'
      run: |
        $package_name = $(Get-Item *.nupkg).Name
        echo "::set-env name=NUPKG_NAME::$package_name"

    - uses: actions/upload-artifact@v1
      if: github.event.inputs.PUBLISH != 'true'
      with:
        name: NuGet-package
        path: ${{ env.NUPKG_NAME }}
